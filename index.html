<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCT2 Litter Image Converter</title>
    <style>
        body { font-family: sans-serif; background: #2b2b2b; color: #f1f1f1; padding: 20px; max-width: 650px; margin: 0 auto; line-height: 1.5; }
        .box { background: #3c3c3c; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #fff; }
        canvas { border: 2px solid #555; image-rendering: pixelated; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAOklEQVQYV2NkYGAwYkAD////Z4QxMIxKAy4tDKOagX/f/zMwMTAwMDIwMAw2xKjmwpEG2F0gWzTjDgB1/xL829/XmAAAAABJRU5ErkJggg=='); }
        .preview-container { text-align: center; }
        textarea { width: 100%; height: 80px; font-family: monospace; margin-top: 10px; background: #111; color: #0f0; padding: 10px; border: 1px solid #555; border-radius: 4px; resize: vertical; box-sizing: border-box; }
        .warning { color: #ff6b6b; font-weight: bold; margin-top: 10px; }
        .success { color: #51cf66; font-weight: bold; margin-top: 10px; }
        input[type="file"] { background: #222; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; cursor: pointer; margin-bottom: 10px; }
        .controls { display: flex; align-items: center; gap: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>Litter Image Palette Converter</h2>
    
    <div class="box">
        <label><strong>1. Select an Image</strong></label>
        <p style="font-size: 0.9em; color: #ccc; margin-top: 5px;">Uses "Foreground Priority" downsampling to preserve thin lines and edges!</p>
        <input type="file" id="imageLoader" accept="image/png, image/jpeg, image/bmp"/>
        <div class="controls">
            <input type="checkbox" id="ignoreWhite" checked> 
            <label for="ignoreWhite">Ignore Pure White Backgrounds</label>
        </div>
    </div>

    <div class="box" style="display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap;">
        <div class="preview-container">
            <p style="margin-top: 0;"><strong>Preview</strong></p>
            <canvas id="previewCanvas" width="32" height="32" style="width: 128px; height: auto;"></canvas>
            <p style="font-size: 0.8em; color: #aaa;">Scaled 4x for visibility</p>
        </div>
        <div style="flex-grow: 1; min-width: 250px;">
            <p style="margin-top: 0;"><strong>2. Copy this string into OpenRCT2:</strong></p>
            <textarea id="outputString" readonly placeholder="Upload an image to generate the string..."></textarea>
            <div id="charCount" class="success">Length: 0 chars</div>
            <div id="limitWarning" class="warning" style="display: none;">WARNING: Exceeds OpenRCT2's 255 character limit! Try a simpler image.</div>
        </div>
    </div>

<script>
    const PALETTE = [
        { char: 'A', id: 0, name: 'Vomit', rgb: [124, 176, 52] },
        { char: 'B', id: 1, name: 'Vomit Alt', rgb: [176, 103, 52] },
        { char: 'C', id: 2, name: 'Empty Can', rgb: [194, 194, 194] },
        { char: 'D', id: 3, name: 'Rubbish', rgb: [115, 104, 94] },
        { char: 'E', id: 4, name: 'Burger Box', rgb: [209, 161, 52] },
        { char: 'F', id: 5, name: 'Empty Cup', rgb: [255, 255, 255] },
        { char: 'G', id: 6, name: 'Empty Box', rgb: [143, 104, 68] },
        { char: 'H', id: 7, name: 'Empty Bottle', rgb: [56, 122, 65] },
        { char: 'I', id: 8, name: 'Bowl Red', rgb: [184, 53, 53] },
        { char: 'J', id: 9, name: 'Drink Carton', rgb: [214, 126, 193] },
        { char: 'K', id: 10, name: 'Juice Cup', rgb: [224, 122, 38] },
        { char: 'L', id: 11, name: 'Bowl Blue', rgb: [61, 96, 184] }
    ];

    const imageLoader = document.getElementById('imageLoader');
    const ignoreWhiteCb = document.getElementById('ignoreWhite');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const outputString = document.getElementById('outputString');
    const charCount = document.getElementById('charCount');
    const limitWarning = document.getElementById('limitWarning');

    let currentImg = null;

    imageLoader.addEventListener('change', handleImage, false);
    ignoreWhiteCb.addEventListener('change', () => { if(currentImg) processImage(currentImg); });

    function handleImage(e) {
        if (!e.target.files || !e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            currentImg = new Image();
            currentImg.onload = function() { processImage(currentImg); }
            currentImg.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function getClosestPaletteChar(r, g, b) {
        const FUZZINESS = 70.0;
        let snappedColor = null;
        
        for (const color of PALETTE) {
            const dist = Math.sqrt(Math.pow(r - color.rgb[0], 2) + Math.pow(g - color.rgb[1], 2) + Math.pow(b - color.rgb[2], 2));
            if (dist <= FUZZINESS) { snappedColor = color; break; }
        }
        
        if (!snappedColor) {
            let closest = PALETTE[0], minD = Infinity;
            for (const color of PALETTE) {
                const dist = Math.sqrt(Math.pow(r - color.rgb[0], 2) + Math.pow(g - color.rgb[1], 2) + Math.pow(b - color.rgb[2], 2));
                if (dist < minD) { minD = dist; closest = color; }
            }
            snappedColor = closest;
        }
        return snappedColor;
    }

    function processImage(img) {
        const MAX_SIZE = 32;
        let w = img.width, h = img.height;
        if (w > MAX_SIZE || h > MAX_SIZE) {
            const ratio = Math.min(MAX_SIZE / w, MAX_SIZE / h);
            w = Math.floor(w * ratio);
            h = Math.floor(h * ratio);
        }
        canvas.width = w; canvas.height = h;
        
        const offCanvas = document.createElement('canvas');
        offCanvas.width = img.width; offCanvas.height = img.height;
        const offCtx = offCanvas.getContext('2d');
        offCtx.drawImage(img, 0, 0);
        const srcData = offCtx.getImageData(0, 0, img.width, img.height).data;

        const imgData = ctx.createImageData(w, h);
        const data = imgData.data;
        const ignoreWhite = ignoreWhiteCb.checked;

        const cellW = img.width / w;
        const cellH = img.height / h;

        let chars2D = [];
        
        for (let y = 0; y < h; y++) {
            let row = [];
            for (let x = 0; x < w; x++) {
                
                let votes = { 'X': 0 };
                PALETTE.forEach(p => votes[p.char] = 0);
                let totalPixelsInCell = 0;

                const startX = Math.floor(x * cellW);
                const endX = Math.floor((x + 1) * cellW);
                const startY = Math.floor(y * cellH);
                const endY = Math.floor((y + 1) * cellH);

                for (let py = startY; py < endY; py++) {
                    for (let px = startX; px < endX; px++) {
                        totalPixelsInCell++;
                        const srcI = (py * img.width + px) * 4;
                        const pr = srcData[srcI], pg = srcData[srcI+1], pb = srcData[srcI+2], pa = srcData[srcI+3];

                        // Dialed back the white ignore to 240 (almost pure white)
                        if (pa < 128 || (ignoreWhite && pr > 240 && pg > 240 && pb > 240)) {
                            votes['X']++;
                        } else {
                            const pChar = getClosestPaletteChar(pr, pg, pb).char;
                            votes[pChar]++;
                        }
                    }
                }

                // --- FOREGROUND PRIORITY VOTING ---
                let winningChar = 'X';
                let maxLitterVotes = 0;
                let winningLitterChar = null;

                // Find the most popular real color
                for (const [char, count] of Object.entries(votes)) {
                    if (char !== 'X' && count > maxLitterVotes) {
                        maxLitterVotes = count;
                        winningLitterChar = char;
                    }
                }

                // If a real color makes up at least 15% of the cell, it wins! 
                // This preserves thin lines from being eroded by empty space.
                if (winningLitterChar && maxLitterVotes >= (totalPixelsInCell * 0.15)) {
                    winningChar = winningLitterChar;
                } else {
                    winningChar = 'X';
                }

                row.push(winningChar);

                const dstI = (y * w + x) * 4;
                if (winningChar === 'X') {
                    data[dstI] = 0; data[dstI+1] = 0; data[dstI+2] = 0; data[dstI+3] = 0;
                } else {
                    const winColor = PALETTE.find(p => p.char === winningChar);
                    data[dstI] = winColor.rgb[0]; data[dstI+1] = winColor.rgb[1]; data[dstI+2] = winColor.rgb[2]; data[dstI+3] = 255;
                }
            }
            chars2D.push(row);
        }

        ctx.putImageData(imgData, 0, 0);

        let minX = w, maxX = -1, minY = h, maxY = -1;
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                if (chars2D[y][x] !== 'X') {
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (maxX === -1) {
            outputString.value = "Image is completely empty or transparent.";
            return;
        }

        const croppedW = maxX - minX + 1;
        let pixelArray = [];
        
        for (let y = minY; y <= maxY; y++) {
            for (let x = minX; x <= maxX; x++) {
                pixelArray.push(chars2D[y][x]);
            }
        }

        let compressedData = "";
        let count = 1;
        for (let i = 1; i <= pixelArray.length; i++) {
            if (pixelArray[i] === pixelArray[i - 1]) {
                count++;
            } else {
                compressedData += (count > 1 ? count : "") + pixelArray[i - 1];
                count = 1; 
            }
        }

        const finalString = `${croppedW}:${compressedData}`;

        outputString.value = finalString;
        const len = finalString.length;
        charCount.innerText = `Length: ${len} chars`;
        
        if (len > 255) {
            charCount.className = "warning";
            limitWarning.style.display = "block";
        } else {
            charCount.className = "success";
            limitWarning.style.display = "none";
        }
        outputString.select();
    }
</script>

</body>
</html>
